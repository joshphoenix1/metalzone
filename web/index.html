<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetalZone — MT-2 Distortion Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <!-- Pedal (actual MT-2 photo as background, interactive knobs overlaid) -->
    <div class="pedal">
      <img class="pedal-img" src="assets/mt2-gal.jpg" alt="Boss MT-2 Metal Zone">

      <!-- LED (position over the 'CHECK' indicator) -->
      <div class="led-overlay" id="led" style="left:50%; top:4.6%;"></div>

      <!-- Knobs: 4 across the top, coordinates are % of image dimensions -->
      <div class="knob-wrap" style="left:16%; top:13.5%;">
        <div class="knob" data-param="level" data-min="0" data-max="1" data-default="0.5" data-size="single"></div>
      </div>

      <div class="knob-wrap" style="left:35%; top:13.5%;">
        <div class="concentric">
          <div class="knob outer" data-param="high" data-min="-15" data-max="15" data-default="0" data-unit="dB"></div>
          <div class="knob inner" data-param="low" data-min="-15" data-max="15" data-default="0" data-unit="dB"></div>
        </div>
      </div>

      <div class="knob-wrap" style="left:61%; top:13.5%;">
        <div class="concentric">
          <div class="knob outer" data-param="midFreq" data-min="200" data-max="5000" data-default="500" data-skew="log" data-unit="Hz"></div>
          <div class="knob inner" data-param="mid" data-min="-15" data-max="15" data-default="0" data-unit="dB"></div>
        </div>
      </div>

      <div class="knob-wrap" style="left:83%; top:13.5%;">
        <div class="knob" data-param="dist" data-min="0" data-max="1" data-default="0.5" data-size="single"></div>
      </div>

      <!-- Footswitch overlay (clickable area over the real footswitch plate) -->
      <div class="footswitch-overlay" id="footswitch" style="left:50%; top:78%;"></div>
    </div>

    <!-- Controls panel -->
    <div class="controls-panel">
      <h2>Audio Source</h2>
      <div class="source-controls">
        <button id="btn-demo">Play Demo Tone</button>
        <button id="btn-stop" disabled>Stop</button>
        <label class="file-label">
          Load File
          <input type="file" id="file-input" accept="audio/*">
        </label>
        <label class="loop-toggle">
          <input type="checkbox" id="loop-check" checked>
          Loop
        </label>
      </div>
      <div class="status" id="status">Click a knob to engage the audio context (browser requirement). Then choose a source.</div>
      <h3>Param readout</h3>
      <div class="readout" id="readout"></div>
      <div class="notes">
        <strong>Note:</strong> Web demo skips oversampling — the VST version does 4x.
        Expect slightly more aliasing here than in the DAW plugin.
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
